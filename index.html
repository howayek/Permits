  <body>
    <div id="root">
      <style>
        .boot {
          font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
          padding: 24px;
          color: #111827;
        }
        .boot p { margin: 8px 0; }
        .boot code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
      </style>
      <div class="boot">
        <p><strong>Loading…</strong></p>
        <p>If this stays blank, open DevTools → Console and share the first error.</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // If the app JS crashes before React mounts, show a helpful message instead of a blank page.
      window.__APP_MOUNTED__ = false;
      setTimeout(function () {
        if (window.__APP_MOUNTED__) return;
        var root = document.getElementById("root");
        if (!root) return;
        // If React didn't replace the boot content, keep showing guidance.
      }, 1500);
    </script>
  </body>
